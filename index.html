<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>闇の中の声</title>
<style>
    body {
        margin: 0;
        background: black;
        color: #ddd;
        font-family: "Courier New", monospace;
        overflow: hidden;
    }

    #game {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
        box-sizing: border-box;
    }

    #text {
        font-size: 20px;
        line-height: 1.5;
        text-shadow: 0 0 5px red;
    }

    #choices {
        margin-top: 20px;
    }

    button {
        background: black;
        color: white;
        border: 1px solid red;
        padding: 10px;
        margin: 5px;
        cursor: pointer;
        width: 100%;
    }

    button:hover {
        background: red;
    }

    #jumpscare {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
    }

    #jumpscare img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #noise {
        position: fixed;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.05;
        background: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
    }
</style>
</head>
<body>

<div id="noise"></div>

<div id="game">
    <div id="text"></div>
    <div id="choices"></div>
</div>

<div id="jumpscare">
    <img src="https://i.imgur.com/8Q2QK6F.jpg">
</div>

<audio id="bgm" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6f1c8d9c9d.mp3">
</audio>

<audio id="scream">
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9c1d4c8f4f.mp3">
</audio>

<script>
const textEl = document.getElementById("text");
const choicesEl = document.getElementById("choices");
const jumpscare = document.getElementById("jumpscare");
const scream = document.getElementById("scream");
const bgm = document.getElementById("bgm");

bgm.volume = 0.3;

let state = "start";

function setScene(text, choices) {
    textEl.innerHTML = text;
    choicesEl.innerHTML = "";
    choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice.text;
        btn.onclick = choice.action;
        choicesEl.appendChild(btn);
    });
}

function startGame() {
    bgm.play();
    setScene(
        "あなたは真夜中、知らない部屋で目を覚ました。<br>ドアの向こうから『何か』が這う音がする…",
        [
            { text: "ドアを開ける", action: openDoor },
            { text: "隠れる", action: hide }
        ]
    );
}

function openDoor() {
    setScene(
        "ドアを開けると、暗い廊下。<br>奥に人影が見える…",
        [
            { text: "近づく", action: approach },
            { text: "戻る", action: back }
        ]
    );
}

function hide() {
    setScene(
        "ベッドの下に隠れた。<br>足音が近づいてくる…<br><br>『見つけた』",
        []
    );
    setTimeout(jumpScare, 2000);
}

function approach() {
    setScene(
        "影がこちらを向いた。顔がない。<br><br>急に走ってきた！！",
        []
    );
    setTimeout(jumpScare, 1500);
}

function back() {
    setScene(
        "部屋に戻ったが、ドアが消えている。<br>後ろに気配を感じる…",
        []
    );
    setTimeout(jumpScare, 2000);
}

function jumpScare() {
    jumpscare.style.display = "flex";
    scream.play();

    setTimeout(() => {
        jumpscare.style.display = "none";
        setScene(
            "……目を覚ました。<br>でも本当に夢だったのか？",
            [
                { text: "もう一度", action: startGame }
            ]
        );
    }, 2000);
}

startGame();
</script>

</body>
</html>
