<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>夜の学校ホラー（移動あり）</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1581090700227-4c4b6c2e0a2f?auto=format&fit=crop&w=1350&q=80') center/cover no-repeat;
  filter: brightness(0.25);
}

#player {
  position: absolute;
  width: 20px;
  height: 20px;
  background: cyan;
  border-radius: 50%;
  left: 50%;
  top: 50%;
}

.object {
  position: absolute;
  width: 30px;
  height: 30px;
  background: red;
}

#ui {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  padding: 15px;
  color: white;
}

#ghost {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://i.imgur.com/8QfQZ6B.png') center/contain no-repeat;
  background-color: black;
  display: none;
  z-index: 999;
}

</style>
</head>
<body>

<div id="game">
  <div id="player"></div>

  <!-- 調べるポイント -->
  <div class="object" id="obj0" style="left:20%; top:30%;"></div>
  <div class="object" id="obj1" style="left:60%; top:50%;"></div>
  <div class="object" id="obj2" style="left:40%; top:70%;"></div>

  <div id="ghost"></div>

  <div id="ui">
    <div id="text">WASDで移動 / 赤い場所でEnter</div>
    <input id="answer" placeholder="答え">
    <button onclick="submitAnswer()">入力</button>
  </div>
</div>

<script>
let player = { x: window.innerWidth/2, y: window.innerHeight/2 };
let speed = 4;

let stage = -1;
let activeObject = null;

const puzzles = [
  {
    question: "黒板：1=5、2=25、3=325、4=4325、5=?",
    answer: "54325"
  },
  {
    question: "ロッカー：2,6,7,5,3 → 逆から読むと？",
    answer: "36572"
  },
  {
    question: "時計が3時。3時間後は？",
    answer: "6"
  }
];

document.addEventListener("keydown", e => {
  if (stage !== -1) return;

  if (e.key === "w") player.y -= speed;
  if (e.key === "s") player.y += speed;
  if (e.key === "a") player.x -= speed;
  if (e.key === "d") player.x += speed;

  if (e.key === "Enter") checkInteraction();

  updatePlayer();
});

function updatePlayer() {
  document.getElementById("player").style.left = player.x + "px";
  document.getElementById("player").style.top = player.y + "px";
}

function checkInteraction() {
  for (let i=0;i<3;i++) {
    let obj = document.getElementById("obj"+i);
    let rect = obj.getBoundingClientRect();

    if (
      player.x > rect.left &&
      player.x < rect.right &&
      player.y > rect.top &&
      player.y < rect.bottom
    ) {
      startPuzzle(i);
    }
  }
}

function startPuzzle(i) {
  stage = i;
  activeObject = i;
  document.getElementById("text").innerText = puzzles[i].question;
}

function submitAnswer() {
  if (stage === -1) return;

  let val = document.getElementById("answer").value;

  if (val === puzzles[stage].answer) {
    document.getElementById("text").innerText = "正解…何かが開いた気がする";
    document.getElementById("obj"+stage).style.display = "none";
    stage = -1;
    document.getElementById("answer").value = "";
  } else {
    jumpScare();
  }
}

function jumpScare() {
  let ghost = document.getElementById("ghost");
  ghost.style.display = "block";

  let audio = new Audio("https://www.soundjay.com/human/sounds/scream-01.mp3");
  audio.play();

  setTimeout(()=>{
    ghost.style.display = "none";
  },1000);
}
</script>

</body>
</html>
